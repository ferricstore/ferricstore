#cloud-config

# FerricStore server node setup
# Installs OTP ${otp_version}, Elixir ${elixir_version}, Rust, configures OS

package_update: true
package_upgrade: true

packages:
  - build-essential
  - git
  - curl
  - unzip
  - libssl-dev
  - automake
  - autoconf
  - libncurses-dev
  - cpufrequtils
  - nvme-cli
  - xfsprogs

write_files:
  # OS tuning for FerricStore
  - path: /etc/sysctl.d/99-ferricstore.conf
    content: |
      # Huge pages for ETS
      vm.nr_hugepages = 512
      # Never swap
      vm.swappiness = 1
      # TCP tuning
      net.core.somaxconn = 65535
      net.core.netdev_max_backlog = 65535
      net.ipv4.tcp_max_syn_backlog = 65535
      net.ipv4.tcp_tw_reuse = 1
      net.ipv4.tcp_fin_timeout = 10
      # Memory overcommit (for fork-based operations)
      vm.overcommit_memory = 1

  # Disable THP
  - path: /etc/systemd/system/disable-thp.service
    content: |
      [Unit]
      Description=Disable Transparent Huge Pages
      DefaultDependencies=no
      After=sysinit.target local-fs.target
      Before=basic.target

      [Service]
      Type=oneshot
      ExecStart=/bin/sh -c 'echo never > /sys/kernel/mm/transparent_hugepage/enabled'
      ExecStart=/bin/sh -c 'echo never > /sys/kernel/mm/transparent_hugepage/defrag'

      [Install]
      WantedBy=basic.target

  # File limits
  - path: /etc/security/limits.d/99-ferricstore.conf
    content: |
      * soft nofile 1048576
      * hard nofile 1048576
      * soft nproc 1048576
      * hard nproc 1048576

  # BEAM VM flags
  - path: /home/${admin_username}/vm.args
    content: |
      +sbt db
      +sbwt very_short
      +swt very_low
      +K true
      +P 5000000
      +Q 65536
      +A 128
      +MHas aoffcbf
      +MBas aoffcbf

  # FerricStore systemd service
  - path: /etc/systemd/system/ferricstore.service
    content: |
      [Unit]
      Description=FerricStore
      After=network.target

      [Service]
      Type=simple
      User=${admin_username}
      WorkingDirectory=/home/${admin_username}/ferricstore
      Environment=MIX_ENV=prod
      Environment=FERRICSTORE_PORT=${ferricstore_port}
      Environment=FERRICSTORE_DATA_DIR=/data/ferricstore
      Environment=FERRICSTORE_SHARD_COUNT=${shard_count}
      Environment=FERRICSTORE_PROTECTED_MODE=false
      Environment=PATH=/home/${admin_username}/.asdf/shims:/home/${admin_username}/.asdf/bin:/home/${admin_username}/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      Environment=ERL_FLAGS="+sbt db +sbwt very_short +swt very_low +K true +A 128 +P 5000000 +Q 65536 +MHas aoffcbf +MBas aoffcbf"
      ExecStart=/home/${admin_username}/.asdf/shims/elixir --sname ferricstore --cookie ferricstore_bench -S mix run --no-halt
      Restart=on-failure
      RestartSec=5
      LimitNOFILE=1048576

      [Install]
      WantedBy=multi-user.target

  # Setup script
  - path: /home/${admin_username}/setup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      echo "=== FerricStore Node Setup ==="

      # Install asdf
      if [ ! -d "$HOME/.asdf" ]; then
        git clone https://github.com/asdf-vm/asdf.git ~/.asdf --branch v0.14.0
        echo '. "$HOME/.asdf/asdf.sh"' >> ~/.bashrc
        echo '. "$HOME/.asdf/completions/asdf.bash"' >> ~/.bashrc
      fi
      source "$HOME/.asdf/asdf.sh"

      # Install Erlang
      asdf plugin add erlang || true
      asdf install erlang ${otp_version}
      asdf global erlang ${otp_version}

      # Install Elixir
      asdf plugin add elixir || true
      asdf install elixir ${elixir_version}-otp-28
      asdf global elixir ${elixir_version}-otp-28

      # Install Rust
      if ! command -v cargo &> /dev/null; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source "$HOME/.cargo/env"
      fi

      # Clone and build FerricStore
      if [ ! -d "$HOME/ferricstore" ]; then
        git clone https://github.com/yoavgeva/ferricstore.git "$HOME/ferricstore"
      fi
      cd "$HOME/ferricstore"
      git fetch origin
      git checkout ${git_branch}
      git pull --ff-only origin ${git_branch}
      mix local.hex --force
      mix local.rebar --force
      mix deps.get
      MIX_ENV=prod mix compile

      echo "=== Setup complete ==="
      echo "Start with: sudo systemctl start ferricstore"

runcmd:
  # Apply sysctl
  - sysctl -p /etc/sysctl.d/99-ferricstore.conf

  # Disable THP
  - systemctl daemon-reload
  - systemctl enable disable-thp
  - systemctl start disable-thp

  # CPU governor
  - cpufreq-set -g performance 2>/dev/null || true

  # Format and mount the local NVMe data disk (L-series VMs).
  #
  # Azure exposes the OS managed disk and the local data NVMe as /dev/nvme*n1.
  # Do not pick "head -1": on prior benchmark VMs that selected the OS disk,
  # leaving FerricStore on slow managed storage. Pick an unmounted disk with no
  # root/boot mountpoints, format it, then verify /data is really mounted before
  # the service can start.
  - |
    find_data_disk() {
      for dev in $(lsblk -dnpo NAME,TYPE | awk '$2 == "disk" {print $1}' | sort); do
        case "$dev" in
          /dev/loop*|/dev/ram*) continue ;;
        esac

        # Skip any disk that already backs root, boot, or an existing mount.
        if lsblk -nrpo MOUNTPOINTS "$dev" | grep -Eq '(^|[[:space:]])/($|[[:space:]])|/boot|/mnt|/data'; then
          continue
        fi

        # Prefer NVMe local disks on L-series. If Azure changes naming, this
        # still stays fail-closed rather than formatting the OS disk.
        case "$(basename "$dev")" in
          nvme*)
            echo "$dev"
            return 0
            ;;
        esac
      done

      return 1
    }

    DATA_DEV="$(find_data_disk || true)"
    if [ -z "$DATA_DEV" ]; then
      echo "ERROR: no unmounted local NVMe data disk found; refusing to put FerricStore on OS disk" >&2
      lsblk -f >&2
      exit 1
    fi

    mkdir -p /data

    case "${data_filesystem}" in
      xfs)
        mkfs.xfs -f "$DATA_DEV"
        mount -o noatime,nodiratime "$DATA_DEV" /data
        echo "$DATA_DEV /data xfs defaults,noatime,nodiratime 0 0" >> /etc/fstab
        ;;
      ext4)
        mkfs.ext4 -F "$DATA_DEV"
        mount -o noatime,nodiratime "$DATA_DEV" /data
        echo "$DATA_DEV /data ext4 defaults,noatime,nodiratime 0 0" >> /etc/fstab
        ;;
      *)
        echo "ERROR: unsupported data filesystem ${data_filesystem}" >&2
        exit 1
        ;;
    esac

    findmnt -no SOURCE,FSTYPE,TARGET /data | tee /var/log/ferricstore-data-mount.log
    mountpoint -q /data

    mkdir -p /data/ferricstore
    chown ${admin_username}:${admin_username} /data/ferricstore

    DATA_NAME=$(basename "$DATA_DEV")
    echo none > "/sys/block/$DATA_NAME/queue/scheduler" 2>/dev/null || true
    echo 1024 > "/sys/block/$DATA_NAME/queue/nr_requests" 2>/dev/null || true

  # Run setup as the admin user
  - chown -R ${admin_username}:${admin_username} /home/${admin_username}
  - chown ${admin_username}:${admin_username} /home/${admin_username}/vm.args /home/${admin_username}/setup.sh
  - su - ${admin_username} -c "/home/${admin_username}/setup.sh"

  # Enable service (don't start — user starts manually after verifying)
  - systemctl daemon-reload
  - systemctl enable ferricstore
