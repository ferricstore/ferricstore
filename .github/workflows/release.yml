name: Build precompiled NIFs

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  validate_release:
    name: Validate release metadata
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Validate version and BSL change date
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          PROJECT_VERSION=$(sed -n 's/.*@version "\(.*\)"/\1/p' apps/ferricstore/mix.exs)
          if [ "$VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag version $VERSION does not match project version $PROJECT_VERSION" >&2
            exit 1
          fi
          COMMIT_TIMESTAMP=$(git show -s --format=%ct "$GITHUB_SHA")
          RELEASE_DATE=$(date -u -d "@${COMMIT_TIMESTAMP}" +%F)
          elixir .github/scripts/stamp_bsl_license.exs --check "$VERSION" "$RELEASE_DATE"

  # -------------------------------------------------------------------------
  # Linux builds: use rustler-precompiled-action with cross-compilation
  # -------------------------------------------------------------------------
  build_linux:
    name: NIF ${{ matrix.crate }} ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    needs: validate_release
    strategy:
      fail-fast: false
      matrix:
        crate: ["ferricstore_bitcask", "ferricstore_wal_nif", "native_protocol_nif"]
        nif: ["2.16"]
        job:
          - { target: aarch64-unknown-linux-gnu,   os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-unknown-linux-gnu,    os: ubuntu-22.04, use-cross: true }
          - { target: aarch64-unknown-linux-musl,  os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-unknown-linux-musl,   os: ubuntu-22.04, use-cross: true }
        exclude:
          - crate: native_protocol_nif
            job: { target: aarch64-unknown-linux-musl,  os: ubuntu-22.04, use-cross: true }
          - crate: native_protocol_nif
            job: { target: x86_64-unknown-linux-musl,   os: ubuntu-22.04, use-cross: true }

    steps:
      - uses: actions/checkout@v6

      - name: Extract project version
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*@version "\(.*\)"/\1/p' apps/ferricstore/mix.exs)
          echo "PROJECT_VERSION=${VERSION}" >> $GITHUB_ENV
          if [ "${{ matrix.crate }}" = "native_protocol_nif" ]; then
            echo "NIF_DIRECTORY=apps/ferricstore_server/native/${{ matrix.crate }}" >> $GITHUB_ENV
          else
            echo "NIF_DIRECTORY=apps/ferricstore/native/${{ matrix.crate }}" >> $GITHUB_ENV
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-precomp
          shared-key: ${{ matrix.crate }}-${{ matrix.job.target }}-${{ matrix.nif }}
          workspaces: ${{ env.NIF_DIRECTORY }}

      - name: Build precompiled NIF
        uses: philss/rustler-precompiled-action@v1.1.5
        id: build
        with:
          project-name: ${{ matrix.crate }}
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: ${{ env.NIF_DIRECTORY }}

      - name: Artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.build.outputs.file-path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.file-name }}
          path: ${{ steps.build.outputs.file-path }}

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.build.outputs.file-path }}
          overwrite_files: true

  # -------------------------------------------------------------------------
  # macOS builds: native cargo build (no cross, no rustler-precompiled-action)
  # The action always installs cross which fails on macOS (ENOEXEC).
  # -------------------------------------------------------------------------
  build_macos:
    name: NIF ${{ matrix.crate }} ${{ matrix.nif }} - ${{ matrix.target }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: validate_release
    strategy:
      fail-fast: false
      matrix:
        crate: ["ferricstore_bitcask", "ferricstore_wal_nif", "native_protocol_nif"]
        nif: ["2.16"]
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
        os: [macos-15]

    steps:
      - uses: actions/checkout@v6

      - name: Extract project version
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*@version "\(.*\)"/\1/p' apps/ferricstore/mix.exs)
          echo "PROJECT_VERSION=${VERSION}" >> $GITHUB_ENV
          if [ "${{ matrix.crate }}" = "native_protocol_nif" ]; then
            echo "NIF_DIRECTORY=apps/ferricstore_server/native/${{ matrix.crate }}" >> $GITHUB_ENV
          else
            echo "NIF_DIRECTORY=apps/ferricstore/native/${{ matrix.crate }}" >> $GITHUB_ENV
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-precomp
          shared-key: ${{ matrix.crate }}-${{ matrix.target }}-${{ matrix.nif }}
          workspaces: ${{ env.NIF_DIRECTORY }}

      - name: Build NIF
        env:
          RUSTLER_NIF_VERSION: ${{ matrix.nif }}
        run: |
          cd ${{ env.NIF_DIRECTORY }}
          cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          TARGET=${{ matrix.target }}
          NIF_VERSION=${{ matrix.nif }}
          VERSION=${{ env.PROJECT_VERSION }}
          CRATE=${{ matrix.crate }}
          LIB_NAME="lib${CRATE}"

          # Find the built library
          if [ -f "${{ env.NIF_DIRECTORY }}/target/${TARGET}/release/${LIB_NAME}.dylib" ]; then
            LIB_FILE="${LIB_NAME}.dylib"
          elif [ -f "${{ env.NIF_DIRECTORY }}/target/${TARGET}/release/${LIB_NAME}.so" ]; then
            LIB_FILE="${LIB_NAME}.so"
          else
            echo "ERROR: Could not find built library"
            ls -la "${{ env.NIF_DIRECTORY }}/target/${TARGET}/release/"
            exit 1
          fi

          SRC="${{ env.NIF_DIRECTORY }}/target/${TARGET}/release/${LIB_FILE}"
          # RustlerPrecompiled expects:
          #   * Tarball name:  lib<crate>-v<ver>-nif-<n>-<triple>.so.tar.gz
          #   * File inside:   lib<crate>-v<ver>-nif-<n>-<triple>.so
          # on every non-Windows platform — yes, even on macOS we use .so.
          INSIDE_NAME="lib${CRATE}-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.so"
          ARCHIVE_FILE="${INSIDE_NAME}.tar.gz"
          STAGING_DIR="staging-${TARGET}"

          mkdir -p "${STAGING_DIR}"
          cp "${SRC}" "${STAGING_DIR}/${INSIDE_NAME}"
          tar -czf "${ARCHIVE_FILE}" -C "${STAGING_DIR}" "${INSIDE_NAME}"
          ARCHIVE_NAME="${INSIDE_NAME}"

          # Generate checksum
          shasum -a 256 "${ARCHIVE_FILE}" | cut -d ' ' -f 1 > "${ARCHIVE_FILE}.sha256"

          echo "ARCHIVE_FILE=${ARCHIVE_FILE}" >> $GITHUB_ENV
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.ARCHIVE_FILE }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_FILE }}
            ${{ env.ARCHIVE_FILE }}.sha256

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.ARCHIVE_FILE }}
            ${{ env.ARCHIVE_FILE }}.sha256
          overwrite_files: true
