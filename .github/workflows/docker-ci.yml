name: Build CI container image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - flow-governance

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish CI image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push branch/SHA image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test published CI image startup
        run: >-
          scripts/smoke-docker-image.sh
          "ghcr.io/${{ github.repository }}:ci-${{ github.sha }}"

      - name: Summary
        run: |
          echo "Published image:" >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${{ github.repository }}:ci-${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
