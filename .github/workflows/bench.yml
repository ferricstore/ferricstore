name: Benchmark

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      warmup:
        description: "Benchee warmup seconds"
        default: "3"
      time:
        description: "Benchee run seconds per scenario"
        default: "10"

env:
  MIX_ENV: bench
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bench:
    name: "TCP + Group-Commit Throughput"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-bench-deps-${{ runner.os }}-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: mix-bench-deps-${{ runner.os }}-1.19-28-

      - name: Install dependencies
        run: mix deps.get

      - name: Build NIF (release)
        run: |
          cargo build --release --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml
          mkdir -p apps/ferricstore/priv/native
          cp apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.so apps/ferricstore/priv/native/ferricstore_bitcask.so

      - name: Compile (bench env)
        run: mix compile

      - name: Show system info
        run: |
          echo "=== CPU ===" && lscpu | grep -E "Model name|Socket|Core|Thread|MHz"
          echo "=== Memory ===" && free -h
          echo "=== Kernel ===" && uname -r
          echo "=== io_uring ===" && cat /proc/sys/kernel/io_uring_disabled 2>/dev/null && echo "(0 = enabled)" || echo "not available"
          echo "=== Scheduler threads ===" && nproc

      - name: Create bench output dir
        run: mkdir -p bench/output

      - name: Run router write benchmark (sharding + group-commit scaling)
        env:
          BENCH_WARMUP: ${{ github.event.inputs.warmup || '3' }}
          BENCH_TIME: ${{ github.event.inputs.time || '10' }}
        run: |
          echo "::group::Router Write Benchmark Output"
          mix run bench/router_write_bench.exs 2>&1 | tee bench/output/router_write_results.txt
          echo "::endgroup::"

      - name: Run TCP benchmark
        env:
          BENCH_WARMUP: ${{ github.event.inputs.warmup || '3' }}
          BENCH_TIME: ${{ github.event.inputs.time || '10' }}
        run: |
          echo "::group::TCP Benchmark Output"
          if [ -f bench/tcp_bench.exs ]; then
            mix run bench/tcp_bench.exs 2>&1 | tee bench/output/tcp_results.txt
          else
            echo "::notice::bench/tcp_bench.exs is not present in this OSS tree; native TCP benchmarks live outside this workflow." | tee bench/output/tcp_results.txt
          fi
          echo "::endgroup::"

      - name: Run commands benchmark
        env:
          BENCH_WARMUP: ${{ github.event.inputs.warmup || '3' }}
          BENCH_TIME: ${{ github.event.inputs.time || '10' }}
        run: |
          echo "::group::Commands Benchmark Output"
          mix run bench/commands_bench.exs 2>&1 | tee bench/output/commands_results.txt
          echo "::endgroup::"

      - name: Print summary
        run: |
          append_section() {
            title="$1"
            file="$2"

            if [ ! -f "$file" ]; then
              return 0
            fi

            echo "### $title" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "$file" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          }

          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### System" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          lscpu | grep -E "Model name|Core\(s\) per socket|Thread" >> "$GITHUB_STEP_SUMMARY"
          free -h | head -2 >> "$GITHUB_STEP_SUMMARY"
          uname -r >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          append_section "Router Write: sharding + group-commit scaling" bench/output/router_write_results.txt
          append_section "Write Backend: sync fsync vs async io_uring" bench/output/write_backend_results.txt
          append_section "TCP / Group-Commit Results" bench/output/tcp_results.txt
          append_section "Store Results" bench/output/store_results.txt
          append_section "Commands Results" bench/output/commands_results.txt

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: bench/output/
          retention-days: 90
