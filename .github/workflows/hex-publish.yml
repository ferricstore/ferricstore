name: Publish to Hex.pm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  MIX_ENV: dev

jobs:
  publish:
    name: Publish packages to Hex.pm
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Check Hex credentials
        id: hex_creds
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [ -n "$HEX_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "HEX_API_KEY is not configured; skipping Hex publish."
          fi

      - name: Set up Elixir
        if: steps.hex_creds.outputs.available == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Cache deps
        if: steps.hex_creds.outputs.available == 'true'
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: hex-publish-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        if: steps.hex_creds.outputs.available == 'true'
        run: mix deps.get

      - name: Extract version from tag
        if: steps.hex_creds.outputs.available == 'true'
        id: version
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*)
              echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Hex publish must run from a v* tag ref, got: $GITHUB_REF"
              exit 1
              ;;
          esac

      - name: Wait for all precompiled NIF artifacts
        if: steps.hex_creds.outputs.available == 'true'
        run: |
          # Four crates x six targets = 24 tarballs. The RESP parser NIF is
          # part of the core package because embedded and server paths share it.
          # native_protocol_nif belongs to the server package/data plane.
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          for i in $(seq 1 90); do
            ASSETS=$(gh release view "v${VERSION}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' 2>/dev/null || true)
            BITCASK_COUNT=$(echo "$ASSETS" | grep -c "ferricstore_bitcask-v${VERSION}-nif-2.16-.*\.tar\.gz$" || true)
            WAL_COUNT=$(echo "$ASSETS" | grep -c "ferricstore_wal_nif-v${VERSION}-nif-2.16-.*\.tar\.gz$" || true)
            RESP_COUNT=$(echo "$ASSETS" | grep -c "resp_parser_nif-v${VERSION}-nif-2.16-.*\.tar\.gz$" || true)
            NATIVE_COUNT=$(echo "$ASSETS" | grep -c "native_protocol_nif-v${VERSION}-nif-2.16-.*\.tar\.gz$" || true)
            echo "Attempt $i/90: bitcask=$BITCASK_COUNT/6, wal=$WAL_COUNT/6, resp=$RESP_COUNT/6, native=$NATIVE_COUNT/6"
            if [ "$BITCASK_COUNT" -ge 6 ] && [ "$WAL_COUNT" -ge 6 ] && [ "$RESP_COUNT" -ge 6 ] && [ "$NATIVE_COUNT" -ge 6 ]; then
              echo "All 24 NIF artifacts present."
              break
            fi
            if [ "$i" = "90" ]; then
              echo "Timed out waiting for NIFs"
              exit 1
            fi
            sleep 10
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate NIF checksum files
        if: steps.hex_creds.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate checksum files directly from the GitHub Release artifacts
          # using a pure shell script. This avoids loading the RustlerPrecompiled
          # macros, which would fail at compile time without an existing checksum.
          set -euo pipefail
          cd apps/ferricstore
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p /tmp/nif_artifacts
          gh release download "v${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir /tmp/nif_artifacts \
            --pattern '*.tar.gz'

          generate_checksum_file() {
            local out_file="$1"
            shift
            {
              echo "%{"
              for pattern in "$@"; do
                for f in /tmp/nif_artifacts/${pattern}; do
                  [ -f "$f" ] || continue
                  local basename=$(basename "$f")
                  local sum=$(shasum -a 256 "$f" | cut -d' ' -f1)
                  echo "  \"${basename}\" => \"sha256:${sum}\","
                done
              done
              echo "}"
            } > "$out_file"
            echo "Generated $out_file:"
            cat "$out_file"
          }

          generate_checksum_file \
            "checksum-Elixir.Ferricstore.Bitcask.NIF.exs" \
            "ferricstore_bitcask-v${VERSION}-*.tar.gz" \
            "libferricstore_bitcask-v${VERSION}-*.tar.gz"

          generate_checksum_file \
            "checksum-ferricstore_wal_nif.exs" \
            "ferricstore_wal_nif-v${VERSION}-*.tar.gz" \
            "libferricstore_wal_nif-v${VERSION}-*.tar.gz"

          generate_checksum_file \
            "checksum-Elixir.Ferricstore.Resp.ParserNif.exs" \
            "resp_parser_nif-v${VERSION}-*.tar.gz" \
            "libresp_parser_nif-v${VERSION}-*.tar.gz"

          cd ../ferricstore_server

          generate_checksum_file \
            "checksum-Elixir.FerricstoreServer.Native.NIF.exs" \
            "native_protocol_nif-v${VERSION}-*.tar.gz" \
            "libnative_protocol_nif-v${VERSION}-*.tar.gz"

      # Publish core package
      - name: Publish ferricstore (core)
        if: steps.hex_creds.outputs.available == 'true'
        run: |
          cd apps/ferricstore
          mix hex.publish --replace --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
