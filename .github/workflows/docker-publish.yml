name: Publish container image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, for example 0.4.1"
        required: true
        type: string
      release_date:
        description: "Original release date in YYYY-MM-DD format"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  version:
    name: Resolve image version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}
      major: ${{ steps.version.outputs.major }}
    steps:
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            case "$GITHUB_REF" in
              refs/tags/v*) VERSION="${GITHUB_REF#refs/tags/v}" ;;
              *) echo "Expected v* tag ref, got $GITHUB_REF" >&2; exit 1 ;;
            esac
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]]; then
            echo "Invalid semantic version: $VERSION" >&2
            exit 1
          fi

          BASE="${VERSION%%[-+]*}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$BASE"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

  validate_release:
    name: Validate release metadata
    needs: version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Validate BSL change date
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            elixir .github/scripts/stamp_bsl_license.exs \
              --check "${{ needs.version.outputs.version }}" "${{ inputs.release_date }}"
          else
            elixir .github/scripts/stamp_bsl_license.exs \
              --check-timestamp "${{ needs.version.outputs.version }}" \
              "${{ github.event.repository.pushed_at }}"
          fi

  build:
    name: Build ${{ matrix.platform }} image
    needs: [version, validate_release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-22.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ${{ env.IMAGE }}:${{ needs.version.outputs.version }}-${{ matrix.suffix }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.licenses=BUSL-1.1
            org.opencontainers.image.description=Redis-compatible durable store and FerricFlow durable execution engine
          cache-from: type=gha,scope=ferricstore-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=ferricstore-${{ matrix.suffix }}

  manifest:
    name: Publish multi-arch manifest
    needs: [version, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch tags
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${{ needs.version.outputs.major_minor }}" \
            -t "${IMAGE}:${{ needs.version.outputs.major }}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

      - name: Inspect published image
        run: docker buildx imagetools inspect "${IMAGE}:${{ needs.version.outputs.version }}"
