name: Tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  MIX_ENV: test
  RUSTFLAGS: "-D warnings"
  CARGO_HTTP_MULTIPLEXING: "false"
  FERRICSTORE_BUILD_NIF: "1"

jobs:
  # ===========================================================================
  # Build (Ubuntu)
  # ===========================================================================
  build-ubuntu:
    name: "Build (ubuntu)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Mix deps
        uses: actions/cache@v5
        with:
          path: deps
          key: mix-deps-Linux-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: mix-deps-Linux-1.19-28-

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/ferricstore/native/ferricstore_bitcask/target
            apps/ferricstore/native/ferricstore_wal_nif/target
            apps/ferricstore_server/native/native_protocol_nif/target
          key: cargo-Linux-${{ hashFiles('apps/ferricstore/native/ferricstore_bitcask/Cargo.lock', 'apps/ferricstore/native/ferricstore_wal_nif/Cargo.lock', 'apps/ferricstore_server/native/native_protocol_nif/Cargo.lock') }}
          restore-keys: cargo-Linux-

      - name: Cache cargo-audit
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-Linux-0.22.2

      - name: Install dependencies
        run: mix deps.get

      - name: Audit Hex dependencies
        run: |
          mix hex.audit
          mix deps.compile --include-children mix_audit
          mix deps.audit

      - name: Install cargo-audit
        run: |
          if ! cargo audit --version 2>/dev/null | grep -q 'cargo-audit 0.22.2'; then
            cargo install cargo-audit --version 0.22.2 --locked
          fi

      - name: Audit Rust dependencies
        run: |
          cargo audit --file apps/ferricstore/native/ferricstore_bitcask/Cargo.lock
          cargo audit --file apps/ferricstore/native/ferricstore_wal_nif/Cargo.lock
          cargo audit --file apps/ferricstore_server/native/native_protocol_nif/Cargo.lock

      - name: Check Rust formatting
        run: |
          cargo fmt --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml -- --check
          cargo fmt --manifest-path apps/ferricstore/native/ferricstore_wal_nif/Cargo.toml -- --check
          cargo fmt --manifest-path apps/ferricstore_server/native/native_protocol_nif/Cargo.toml -- --check

      - name: Run Clippy
        run: |
          cargo clippy --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path apps/ferricstore/native/ferricstore_wal_nif/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path apps/ferricstore_server/native/native_protocol_nif/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests (bitcask)
        run: cargo test --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml

      - name: Run Rust tests (wal_nif)
        run: cargo test --manifest-path apps/ferricstore/native/ferricstore_wal_nif/Cargo.toml

      - name: Run Rust tests (native_protocol_nif)
        run: cargo test --manifest-path apps/ferricstore_server/native/native_protocol_nif/Cargo.toml

      - name: Build NIF (release)
        run: |
          cargo build --release --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml
          cargo build --release --manifest-path apps/ferricstore/native/ferricstore_wal_nif/Cargo.toml
          cargo build --release --manifest-path apps/ferricstore_server/native/native_protocol_nif/Cargo.toml
          mkdir -p apps/ferricstore/priv/native
          mkdir -p apps/ferricstore_server/priv/native
          cp apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.so apps/ferricstore/priv/native/libferricstore_bitcask.so
          cp apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.so apps/ferricstore/priv/native/ferricstore_bitcask.so
          cp apps/ferricstore/native/ferricstore_wal_nif/target/release/libferricstore_wal_nif.so apps/ferricstore/priv/native/libferricstore_wal_nif.so
          cp apps/ferricstore/native/ferricstore_wal_nif/target/release/libferricstore_wal_nif.so apps/ferricstore/priv/native/ferricstore_wal_nif.so
          cp apps/ferricstore_server/native/native_protocol_nif/target/release/libnative_protocol_nif.so apps/ferricstore_server/priv/native/libnative_protocol_nif.so
          cp apps/ferricstore_server/native/native_protocol_nif/target/release/libnative_protocol_nif.so apps/ferricstore_server/priv/native/native_protocol_nif.so

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run Linux io_uring integration tests when available
        run: |
          set -e
          echo "io_uring_disabled=$(cat /proc/sys/kernel/io_uring_disabled 2>/dev/null || echo unknown)"
          if ! mix run -e 'if Ferricstore.Bitcask.NIF.io_uring_available(), do: System.halt(0), else: System.halt(1)'; then
            echo "::notice::io_uring unavailable on this runner; skipping tagged Linux io_uring tests"
            exit 0
          fi
          mix test apps/ferricstore/test/ferricstore/store/io_uring_integration_test.exs --only linux_io_uring --timeout 120000

      - name: Credo
        run: |
          mix credo suggest --only warning --min-priority high --files-excluded 'apps/*/test/**/*'
          mix credo suggest --only warning --min-priority high --ignore-checks UnusedListOperation,ExpensiveEmptyEnumCheck

      - name: Upload native artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-Linux
          path: |
            apps/ferricstore/priv/native
            apps/ferricstore_server/priv/native
          retention-days: 1

  # ===========================================================================
  # Build (macOS)
  # ===========================================================================
  build-macos:
    name: "Build (macos)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Mix deps
        uses: actions/cache@v5
        with:
          path: deps
          key: mix-deps-macOS-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: mix-deps-macOS-1.19-28-

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/ferricstore/native/ferricstore_bitcask/target
            apps/ferricstore/native/ferricstore_wal_nif/target
            apps/ferricstore_server/native/native_protocol_nif/target
          key: cargo-macOS-${{ hashFiles('apps/ferricstore/native/ferricstore_bitcask/Cargo.lock', 'apps/ferricstore/native/ferricstore_wal_nif/Cargo.lock', 'apps/ferricstore_server/native/native_protocol_nif/Cargo.lock') }}
          restore-keys: cargo-macOS-

      - name: Install dependencies
        run: mix deps.get

      - name: Check Rust formatting
        run: |
          cargo fmt --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml -- --check
          cargo fmt --manifest-path apps/ferricstore/native/ferricstore_wal_nif/Cargo.toml -- --check
          cargo fmt --manifest-path apps/ferricstore_server/native/native_protocol_nif/Cargo.toml -- --check

      - name: Run Clippy
        run: |
          cargo clippy --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path apps/ferricstore/native/ferricstore_wal_nif/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path apps/ferricstore_server/native/native_protocol_nif/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests (bitcask)
        run: cargo test --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml

      - name: Run Rust tests (wal_nif)
        run: cargo test --manifest-path apps/ferricstore/native/ferricstore_wal_nif/Cargo.toml

      - name: Run Rust tests (native_protocol_nif)
        run: cargo test --manifest-path apps/ferricstore_server/native/native_protocol_nif/Cargo.toml

      - name: Build NIF (release)
        run: |
          cargo build --release --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml
          cargo build --release --manifest-path apps/ferricstore/native/ferricstore_wal_nif/Cargo.toml
          cargo build --release --manifest-path apps/ferricstore_server/native/native_protocol_nif/Cargo.toml
          mkdir -p apps/ferricstore/priv/native
          mkdir -p apps/ferricstore_server/priv/native
          cp apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.dylib apps/ferricstore/priv/native/libferricstore_bitcask.so
          cp apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.dylib apps/ferricstore/priv/native/ferricstore_bitcask.so
          cp apps/ferricstore/native/ferricstore_wal_nif/target/release/libferricstore_wal_nif.dylib apps/ferricstore/priv/native/libferricstore_wal_nif.so
          cp apps/ferricstore/native/ferricstore_wal_nif/target/release/libferricstore_wal_nif.dylib apps/ferricstore/priv/native/ferricstore_wal_nif.so
          cp apps/ferricstore_server/native/native_protocol_nif/target/release/libnative_protocol_nif.dylib apps/ferricstore_server/priv/native/libnative_protocol_nif.so
          cp apps/ferricstore_server/native/native_protocol_nif/target/release/libnative_protocol_nif.dylib apps/ferricstore_server/priv/native/native_protocol_nif.so

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo
        run: |
          mix credo suggest --only warning --min-priority high --files-excluded 'apps/*/test/**/*'
          mix credo suggest --only warning --min-priority high --ignore-checks UnusedListOperation,ExpensiveEmptyEnumCheck

      - name: Upload native artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-macOS
          path: |
            apps/ferricstore/priv/native
            apps/ferricstore_server/priv/native
          retention-days: 1

  # ===========================================================================
  # Architecture tests (visible guardrail)
  # ===========================================================================
  architecture-tests:
    name: "Architecture tests"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: build-Linux
          path: .

      - name: Ensure dependencies
        run: mix deps.get

      - name: Run architecture tests
        run: |
          mix test \
            apps/ferricstore/test/ferricstore/arch_test.exs \
            apps/ferricstore_server/test/ferricstore_server/arch_test.exs \
            --timeout 120000

      - name: Upload architecture test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-results-architecture
          path: test-results/
          retention-days: 30

  # ===========================================================================
  # Core tests (parallel per OS, independent)
  # ===========================================================================
  test-core-ubuntu:
    name: "Core tests (ubuntu ${{ matrix.partition }}/3)"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: build-Linux
          path: .
      - name: Ensure dependencies
        run: mix deps.get
      - name: Run ferricstore tests
        timeout-minutes: 45
        run: |
          selection_file=$(mktemp)
          trap 'rm -f "$selection_file"' EXIT
          elixir .github/scripts/core_test_partition.exs \
            apps/ferricstore/test \
            .github/test-timings/ferricstore.tsv \
            3 \
            ${{ matrix.partition }} \
            apps/ferricstore/test/ferricstore/raft/waraft_backend_test.exs \
            > "$selection_file"

          files=()
          while IFS= read -r file; do
            if [ -n "$file" ]; then files+=("$file"); fi
          done < "$selection_file"

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No test files assigned to core partition ${{ matrix.partition }}"
            exit 1
          fi

          mix test "${files[@]}" --timeout 30000
      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: test-results-core-ubuntu-${{ matrix.partition }}
          path: test-results/
          retention-days: 14

  test-core-macos:
    name: "Core tests (macos ${{ matrix.partition }}/3)"
    needs: build-macos
    runs-on: macos-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: build-macOS
          path: .
      - name: Ensure dependencies
        run: mix deps.get
      - name: Run ferricstore tests
        timeout-minutes: 80
        run: |
          selection_file=$(mktemp)
          trap 'rm -f "$selection_file"' EXIT
          elixir .github/scripts/core_test_partition.exs \
            apps/ferricstore/test \
            .github/test-timings/ferricstore.tsv \
            3 \
            ${{ matrix.partition }} \
            apps/ferricstore/test/ferricstore/raft/waraft_backend_test.exs \
            > "$selection_file"

          files=()
          while IFS= read -r file; do
            if [ -n "$file" ]; then files+=("$file"); fi
          done < "$selection_file"

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No test files assigned to core partition ${{ matrix.partition }}"
            exit 1
          fi

          mix test "${files[@]}" --timeout 30000
      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: test-results-core-macos-${{ matrix.partition }}
          path: test-results/
          retention-days: 14

  # WARaft's backend suite is intentionally one async:false test module. ExUnit
  # partitions by file, so keeping it in the core matrix overloads one partition.
  test-waraft-ubuntu:
    name: "WARaft backend tests (ubuntu)"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: build-Linux
          path: .
      - name: Ensure dependencies
        run: mix deps.get
      - name: Run WARaft backend tests
        timeout-minutes: 55
        run: mix test apps/ferricstore/test/ferricstore/raft/waraft_backend_test.exs --timeout 30000
      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: test-results-waraft-ubuntu
          path: test-results/
          retention-days: 14

  test-waraft-macos:
    name: "WARaft backend tests (macos)"
    needs: build-macos
    runs-on: macos-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: build-macOS
          path: .
      - name: Ensure dependencies
        run: mix deps.get
      - name: Run WARaft backend tests
        timeout-minutes: 65
        run: mix test apps/ferricstore/test/ferricstore/raft/waraft_backend_test.exs --timeout 30000
      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: test-results-waraft-macos
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Server tests (parallel per OS, independent)
  # ===========================================================================
  test-server-ubuntu:
    name: "Server tests (ubuntu ${{ matrix.partition }}/3)"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: build-Linux
          path: .
      - name: Ensure dependencies
        run: mix deps.get
      - name: Run ferricstore_server tests
        timeout-minutes: 45
        run: MIX_TEST_PARTITION=${{ matrix.partition }} mix test apps/ferricstore_server/test --partitions 3 --timeout 30000
      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: test-results-server-ubuntu-${{ matrix.partition }}
          path: test-results/
          retention-days: 14

  test-server-macos:
    name: "Server tests (macos ${{ matrix.partition }}/3)"
    needs: build-macos
    runs-on: macos-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: build-macOS
          path: .
      - name: Ensure dependencies
        run: mix deps.get
      - name: Run ferricstore_server tests
        timeout-minutes: 45
        run: MIX_TEST_PARTITION=${{ matrix.partition }} mix test apps/ferricstore_server/test --partitions 3 --timeout 30000
      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: test-results-server-macos-${{ matrix.partition }}
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Durability tests (ubuntu only — shard-kill, jepsen, large alloc)
  # ===========================================================================
  test-durability:
    name: "Durability tests"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: build-Linux
          path: .

      - name: Ensure dependencies
        run: mix deps.get

      - name: Run ferricstore shard-kill tests
        run: |
          set -o pipefail
          epmd -daemon
          elixir --sname ci_shard_kill --cookie ferricstore_test -S mix test apps/ferricstore/test --only shard_kill --timeout 120000 2>&1 | tee /tmp/durability_shard_kill.log

      - name: Run ferricstore_server shard-kill tests
        if: success() || failure()
        run: |
          set -o pipefail
          mix test apps/ferricstore_server/test --only shard_kill --timeout 120000 2>&1 | tee /tmp/durability_server_shard_kill.log

      - name: Run Jepsen tests
        if: success() || failure()
        run: |
          set -o pipefail
          epmd -daemon
          elixir --sname ci_jepsen --cookie ferricstore_test -S mix test apps/ferricstore/test --only jepsen --timeout 120000 2>&1 | tee /tmp/durability_jepsen.log

      - name: Run large-allocation tests
        if: success() || failure()
        run: |
          set -o pipefail
          mix test apps/ferricstore/test --only large_alloc --timeout 120000 2>&1 | tee /tmp/durability_large_alloc.log

      # io_uring tests run in build-ubuntu:
      # - Rust-level backend tests via cargo test.
      # - Elixir :linux_io_uring integration tests when the runner supports io_uring.

      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: test-results-durability
          path: |
            test-results/
            /tmp/durability_*.log
          retention-days: 14

  # ===========================================================================
  # Performance guards (ubuntu only — bounded PR-safe regression checks)
  # ===========================================================================
  test-perf-guard:
    name: "Performance guards"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: build-Linux
          path: .

      - name: Ensure dependencies
        run: mix deps.get

      - name: Run bounded performance guards
        run: mix test apps/ferricstore/test --only perf_guard --timeout 120000

      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: test-results-perf-guard
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Cluster tests (ubuntu only — multi-node via :peer)
  # ===========================================================================
  test-cluster:
    name: "Cluster tests"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v8
        with:
          name: build-Linux
          path: .

      - name: Ensure dependencies
        run: mix deps.get

      - name: Run ferricstore cluster tests
        run: |
          set -o pipefail
          epmd -daemon
          data_dir=$(mktemp -d "/tmp/ferricstore-cluster-XXXXXX")
          echo "Running ferricstore cluster tests with data_dir=${data_dir}"
          FERRICSTORE_DATA_DIR="$data_dir" \
            elixir --sname ci_cluster_ferricstore --cookie ferricstore_test -S mix test apps/ferricstore/test --only cluster --timeout 180000 --seed 0 2>&1 | tee /tmp/cluster_ferricstore.log

      - name: Run ferricstore_server cluster tests
        if: success() || failure()
        run: |
          set -o pipefail
          epmd -daemon
          data_dir=$(mktemp -d "/tmp/ferricstore-server-cluster-XXXXXX")
          echo "Running ferricstore_server cluster tests with data_dir=${data_dir}"
          FERRICSTORE_DATA_DIR="$data_dir" \
            elixir --sname ci_cluster_server --cookie ferricstore_test -S mix test apps/ferricstore_server/test --only cluster --timeout 180000 --seed 0 2>&1 | tee /tmp/cluster_ferricstore_server.log

      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: test-results-cluster
          path: |
            test-results/
            /tmp/cluster_*.log
          retention-days: 14
